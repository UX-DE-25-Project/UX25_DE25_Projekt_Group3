<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>RightHome Karta</title>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #map { width: 100%; height: 100%; }
        .info-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(255,255,255,0.9);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 1000;
            pointer-events: none;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="info-panel" id="infoPanel">Laddar bostäder...</div>

    <script>
        let map;
        let bostadMarkers = [];
        let placeMarkers = [];
        let allBostader = [];
        let platserMap = {};
        let priserMap = {};
        let placesService = null;
        let mapReady = false;
        let dataReady = false;

        const urlParams = new URLSearchParams(window.location.search);
        const currentType = urlParams.get('service') || 'all';

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 59.3293, lng: 18.0686 },
                zoom: 12,
                streetViewControl: false,
                mapTypeControl: false,
                fullscreenControl: false
            });

            placesService = new google.maps.places.PlacesService(map);

            google.maps.event.addListenerOnce(map, 'bounds_changed', function() {
                mapReady = true;
                tryApplyFilter();
            });

            loadData();
        }

        function tryApplyFilter() {
            if (!mapReady || !dataReady) return;
            if (currentType !== 'bostader') {
                applyServiceFilter(currentType);
            }
        }

        function loadData() {
            let platserLoaded = false;
            let priserLoaded = false;
            let bostaderLoaded = false;

            function tryStart() {
                if (!platserLoaded || !priserLoaded || !bostaderLoaded) return;
                document.getElementById('infoPanel').innerHTML = allBostader.length + ' bostäder laddade';
                addBostadMarkers(allBostader);
                dataReady = true;
                tryApplyFilter();
            }

            Papa.parse("ETL_Pipline/platser.csv", {
                download: true, header: true,
                complete: function(results) {
                    results.data.forEach(p => {
                        if (p.plats_id) platserMap[p.plats_id] = { område: p.område, stad: p.stad };
                    });
                    platserLoaded = true; tryStart();
                },
                error: function() { platserLoaded = true; tryStart(); }
            });

            Papa.parse("ETL_Pipline/priser.csv", {
                download: true, header: true,
                complete: function(results) {
                    results.data.forEach(p => {
                        if (p.bostad_id) priserMap[p.bostad_id] = { pris: p.pris, avgift: p.avgift };
                    });
                    priserLoaded = true; tryStart();
                },
                error: function() { priserLoaded = true; tryStart(); }
            });

            Papa.parse("ETL_Pipline/bostader.csv", {
                download: true, header: true,
                complete: function(results) {
                    allBostader = results.data.filter(b => b.adress && b.lat && b.lon && parseFloat(b.lat) !== 0);
                    bostaderLoaded = true; tryStart();
                },
                error: function() {
                    document.getElementById('infoPanel').innerHTML = "Fel vid laddning av bostäder";
                    bostaderLoaded = true; tryStart();
                }
            });
        }

        function addBostadMarkers(bostader) {
            bostadMarkers.forEach(m => m.setMap(null));
            bostadMarkers = [];

            bostader.slice(0, 300).forEach(b => {
                let lat = parseFloat(b.lat);
                let lng = parseFloat(b.lon);
                if (isNaN(lat) || isNaN(lng)) return;

                let plats = platserMap[b.plats_id] || {};
                let pris  = priserMap[b.id] || {};

                let marker = new google.maps.Marker({
                    position: { lat, lng },
                    map: map,
                    icon: {
                        path: google.maps.SymbolPath.CIRCLE,
                        scale: 8,
                        fillColor: '#E8735A',
                        fillOpacity: 0.9,
                        strokeColor: '#fff',
                        strokeWeight: 2
                    }
                });

                let prisText   = pris.pris ? parseInt(pris.pris).toLocaleString('sv-SE') + ' kr' : 'Pris saknas';
                let avgiftText = pris.avgift && parseInt(pris.avgift) > 0
                    ? '<br>Avgift: ' + parseInt(pris.avgift).toLocaleString('sv-SE') + ' kr/mån' : '';
                let stadText   = plats.stad
                    ? plats.stad + (plats.område ? ' – ' + plats.område : '') : (b.stad || '');

                let info = new google.maps.InfoWindow({
                    content: `<div style="padding:10px;min-width:180px;font-family:'Segoe UI',Arial,sans-serif">
                        <strong>${b.adress}</strong><br>
                        <span style="color:#555">${stadText}</span><br>
                        <span style="color:#E8735A;font-weight:bold;font-size:15px">${prisText}</span>${avgiftText}
                    </div>`
                });
                marker.addListener("click", () => info.open(map, marker));
                bostadMarkers.push(marker);
            });
        }

        function clearPlaces() {
            placeMarkers.forEach(m => m.setMap(null));
            placeMarkers = [];
        }

        function addPlaces(places, typeName, color) {
            places.forEach(place => {
                if (!place.geometry) return;
                let marker = new google.maps.Marker({
                    position: place.geometry.location,
                    map: map,
                    icon: 'https://maps.google.com/mapfiles/ms/icons/' + color + '-dot.png'
                });
                let info = new google.maps.InfoWindow({
                    content: `<div style="padding:10px;font-family:'Segoe UI',Arial,sans-serif">
                        <strong>${place.name}</strong><br>
                        <span style="color:#555">${place.vicinity || ''}</span><br>
                        <span style="color:#E8735A">${typeName}</span>
                    </div>`
                });
                marker.addListener("click", () => info.open(map, marker));
                placeMarkers.push(marker);
            });
        }

        function applyServiceFilter(type) {
            clearPlaces();
            if (!placesService) return;

            let bounds = map.getBounds();
            if (!bounds) return;

            const config = {
                gym:         { name: 'Gym',       color: 'orange' },
                school:      { name: 'Skola',     color: 'purple' },
                library:     { name: 'Bibliotek', color: 'blue'   },
                supermarket: { name: 'Mataffär',  color: 'green'  },
                pharmacy:    { name: 'Apotek',    color: 'pink'   }
            };

            if (type === 'all') {
                Object.entries(config).forEach(([t, cfg]) => {
                    placesService.nearbySearch({ bounds, type: t }, (results, status) => {
                        if (status === 'OK' && results.length) addPlaces(results, cfg.name, cfg.color);
                    });
                });
            } else if (config[type]) {
                placesService.nearbySearch({ bounds, type }, (results, status) => {
                    if (status === 'OK' && results.length) addPlaces(results, config[type].name, config[type].color);
                });
            }
        }

        window.initMap = initMap;
    </script>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCdh424dxbddWDKWygYygc3s94jXYjl-5E&libraries=places&callback=initMap" async defer></script>
</body>
</html>
