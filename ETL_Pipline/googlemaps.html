<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>RightHome - Karta med filtrering</title>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; }
        .header { background: #1A2E4A; color: white; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: bold; }
        .logo span { color: #E8735A; }
        .filter-bar {
            background: white;
            padding: 10px 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            border-bottom: 1px solid #ddd;
            z-index: 1;
        }
        .filter-btn {
            background: #F5F0E8;
            border: 1px solid #ddd;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: #E8735A;
            color: white;
            border-color: #E8735A;
        }
        .map-container { flex: 1; position: relative; }
        #map { width: 100%; height: 100%; }
        .info-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(255,255,255,0.9);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            z-index: 1000;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">Right<span>Home</span></div>
        <div>Hitta din nya bostad</div>
    </div>

    <div class="filter-bar">
        <button class="filter-btn" data-type="bostader">Bara bostäder</button>
        <button class="filter-btn active" data-type="all">Alla platser</button>
        <button class="filter-btn" data-type="gym">Gym</button>
        <button class="filter-btn" data-type="school">Skola</button>
        <button class="filter-btn" data-type="library">Bibliotek</button>
        <button class="filter-btn" data-type="supermarket">Mataffär</button>
        <button class="filter-btn" data-type="pharmacy">Apotek</button>
    </div>

    <div class="map-container">
        <div id="map"></div>
        <div class="info-panel" id="infoPanel">Laddar bostäder...</div>
    </div>

    <script>
        let map;
        let bostadMarkers = [];
        let placeMarkers = [];
        let allBostader = [];
        let currentPlacesService = null;
        let currentType = 'all';

        function initMap() {
            map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 59.3293, lng: 18.0686 },
                zoom: 11
            });
            currentPlacesService = new google.maps.places.PlacesService(map);
            loadBostader();
        }

        function loadBostader() {
            Papa.parse("right_home_cleaned.csv", {
                download: true,
                header: true,
                complete: function(results) {
                    allBostader = results.data.filter(b => b.adress && b.lat && b.lon && parseFloat(b.lat) !== 0);
                    document.getElementById('infoPanel').innerHTML = allBostader.length + ' bostäder laddade';
                    addBostadMarkers(allBostader);
                    if (currentType === 'all') searchAll();
                },
                error: function() {
                    document.getElementById('infoPanel').innerHTML = "Fel vid laddning";
                }
            });
        }

        function addBostadMarkers(bostader) {
            bostadMarkers.forEach(m => m.setMap(null));
            bostadMarkers = [];
            bostader.slice(0, 200).forEach(b => {
                let lat = parseFloat(b.lat);
                let lng = parseFloat(b.lon);
                if (!isNaN(lat) && !isNaN(lng)) {
                    let marker = new google.maps.Marker({
                        position: { lat: lat, lng: lng },
                        map: map,
                        icon: { url: "http://maps.google.com/mapfiles/ms/icons/red-dot.png" }
                    });
                    let info = new google.maps.InfoWindow({
                        content: `<div style="padding:10px"><strong>${b.adress}</strong><br>${b.stad}<br>${b.rum} rum, ${b.boyta} kvm<br><span style="color:#E8735A">${parseInt(b.pris).toLocaleString()} kr</span></div>`
                    });
                    marker.addListener("click", () => info.open(map, marker));
                    bostadMarkers.push(marker);
                }
            });
        }

        function clearPlaces() {
            placeMarkers.forEach(m => m.setMap(null));
            placeMarkers = [];
        }

        function addPlaces(places, type, color) {
            places.forEach(place => {
                if (!place.geometry) return;
                let marker = new google.maps.Marker({
                    position: place.geometry.location,
                    map: map,
                    icon: 'http://maps.google.com/mapfiles/ms/icons/' + color + '-dot.png'
                });
                let info = new google.maps.InfoWindow({
                    content: `<div style="padding:10px"><strong>${place.name}</strong><br>${place.vicinity || ''}<br><span style="color:#E8735A">${type}</span></div>`
                });
                marker.addListener("click", () => info.open(map, marker));
                placeMarkers.push(marker);
            });
        }

        function searchAll() {
            if (!currentPlacesService) return;
            clearPlaces();
            let bounds = map.getBounds();
            if (!bounds) return;
            
            let types = ['gym', 'school', 'library', 'supermarket', 'pharmacy'];
            let colors = ['orange', 'purple', 'blue', 'green', 'pink'];
            let names = ['Gym', 'Skola', 'Bibliotek', 'Mataffär', 'Apotek'];
            
            types.forEach((t, i) => {
                currentPlacesService.nearbySearch({ bounds: bounds, type: t }, (results, status) => {
                    if (status === 'OK' && results.length) {
                        addPlaces(results, names[i], colors[i]);
                    }
                });
            });
            
            document.getElementById('infoPanel').innerHTML = 'Visar alla platser + ' + allBostader.length + ' bostäder';
        }

        function searchType(type, name, color) {
            if (!currentPlacesService) return;
            clearPlaces();
            let bounds = map.getBounds();
            if (!bounds) return;
            
            currentPlacesService.nearbySearch({ bounds: bounds, type: type }, (results, status) => {
                if (status === 'OK' && results.length) {
                    addPlaces(results, name, color);
                    document.getElementById('infoPanel').innerHTML = results.length + ' st ' + name + ' + ' + allBostader.length + ' bostäder';
                } else {
                    document.getElementById('infoPanel').innerHTML = 'Inga ' + name + ' hittades. Visar endast ' + allBostader.length + ' bostäder';
                }
            });
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentType = btn.getAttribute('data-type');
                
                if (currentType === 'bostader') {
                    clearPlaces();
                    document.getElementById('infoPanel').innerHTML = allBostader.length + ' bostäder (inga andra platser)';
                } else if (currentType === 'all') {
                    searchAll();
                } else if (currentType === 'gym') {
                    searchType('gym', 'Gym', 'orange');
                } else if (currentType === 'school') {
                    searchType('school', 'Skola', 'purple');
                } else if (currentType === 'library') {
                    searchType('library', 'Bibliotek', 'blue');
                } else if (currentType === 'supermarket') {
                    searchType('supermarket', 'Mataffär', 'green');
                } else if (currentType === 'pharmacy') {
                    searchType('pharmacy', 'Apotek', 'pink');
                }
            });
        });

        window.initMap = initMap;
    </script>

    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyD6s0xeoS3rrEFMZUr2ToMEVp0l7F0tf_8&libraries=places&callback=initMap" async defer></script>
</body>
</html>
